spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/groom_third
    username: dev
    password: dev123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true # 개발용, 런타임에서 로그 보기 어려우면 false로 비활성화

  flyway:
    enabled: false  # 개발 환경에서 Hibernate 자동 스키마 업데이트를 위해 일시적으로 비활성화
    locations: classpath:db/migration

  servlet:
    multipart:
      enabled: true
      max-file-size: 50MB  # 개별 파일 크기 제한
      max-request-size: 50MB  # 전체 요청 크기 제한
      file-size-threshold: 2KB

springdoc:
  swagger-ui:
    enabled: true
    path: /v1/swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v1/api-docs
  enabled: true

server:
  port: 8080
  servlet:
    context-path: /api
  address: 0.0.0.0
  tomcat:
    max-http-post-size: 50MB  # HTTP POST 요청 본문 크기 제한 (Base64 이미지 포함 JSON 요청용)
    max-swallow-size: 50MB  # 스왈로우(swallow) 크기 제한

# Redis 설정
redis:
  host: localhost
  port: 6379
  password:
  timeout: 3000ms
  lettuce:
    pool:
      max-active: 10
      max-idle: 10
      min-idle: 2
      max-wait: -1ms
  cache:
    time-to-live: 1800000ms # 30분 (밀리초)
    cache-null-values: false

# API 키는 application-secret.yml에 정의되어 있음

# 로깅 설정
logging:
  level:
    root: INFO
    groom.backend.common.service.S3Service: INFO  # S3 서비스 로그 레벨
    software.amazon.awssdk: DEBUG  # AWS SDK 상세 로그 (필요시)

# 프론트엔드 URL (개발 환경 - nginx 80포트를 통한 접속)
frontend:
  url: http://localhost
