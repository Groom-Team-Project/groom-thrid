spring:
  datasource:
    url: jdbc:postgresql://db:5432/groom_third
    username: dev
    password: dev123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration

  springdoc:
    swagger-ui:
      enabled: true
      path: /swagger-ui.html
      operations-sorter: method
      tags-sorter: alpha
    api-docs:
      path: /v3/api-doc
    enabled: true

server:
  port: 8080
  servlet:
    context-path: /api
  address: 0.0.0.0

# Redis 설정
redis:
  host: localhost
  port: 6379
  password:
  timeout: 3000ms
  lettuce:
    pool:
      max-active: 10
      max-idle: 10
      min-idle: 2
      max-wait: -1ms

# API 키는 application-secret.yml에 정의되어 있음
