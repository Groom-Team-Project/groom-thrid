spring:
  datasource:
    url: jdbc:postgresql://db:5432/groom_third
    username: dev
    password: dev123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate

  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  swagger-ui:
    enabled: true
    path: /v1/swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  api-docs:
    path: /v1/api-docs
  enabled: true

# CORS 설정
app:
  api:
    server-url: https://wheelfinder.deving.xyz/api  # 실제 운영 도메인
  cors:
    allowed-origins:
      - https://wheelfinder.deving.xyz

server:
  port: 8080
  address: 0.0.0.0
  servlet:
    context-path: /api
  forward-headers-strategy: native  # 리버스 프록시 사용 시 X-Forwarded-* 헤더를 Spring이 사용하도록 함

# Redis 설정
redis:
  host: redis
  port: 6379
  password:
  timeout: 3000ms
  lettuce:
    pool:
      max-active: 10
      max-idle: 10
      min-idle: 2
      max-wait: -1ms
  cache:
    time-to-live: 1800000ms # 30분 (밀리초)
    cache-null-values: false
# API 키는 application-secret.yml에 정의되어 있음

# 로깅 설정
logging:
  level:
    root: INFO
    groom.backend.common.service.S3Service: INFO  # S3 서비스 로그 레벨
    software.amazon.awssdk: DEBUG  # AWS SDK 상세 로그 (필요시)

