# ============================================
# 이벤트 블록: Nginx 동작 방식 설정
# ============================================
events {
    worker_connections 1024; # 각 worker 프로세스가 동시 처리할 수 있는 최대 연결 수
}

# ============================================
# HTTP 블록: 모든 웹 서버 설정
# ============================================
http {
  # ------------------------------------------
  # WebSocket 지원을 위한 맵 설정
  # ------------------------------------------
  map $http_upgrade $connection_upgrade {
    default upgrade; # 클라이언트가 "Upgrade: websocket" 보내면 연결 업그레이드
    ''      close; # Upgrade 헤더가 없으면 일반 HTTP 연결
  }

  # ------------------------------------------
  # 업스트림 정의: 백엔드 서버 그룹
  # ------------------------------------------
  upstream frontend {
    server frontend:3000;  # Docker Compose의 frontend 서비스
  }

  upstream backend {
    server backend:8080;   # Docker Compose의 backend 서비스
  }

  # ============================================
  # HTTP 서버 (포트 80)
  # 목적: HTTPS로 리다이렉트
  # ============================================
  server {
    listen 80;                          # IPv4의 80포트에서 수신
    listen [::]:80;                     # IPv6의 80포트에서 수신
    server_name wheelfinder.deving.xyz; # 본인의 도메인

    # Let's Encrypt 인증서 갱신을 위한 경로
    # Certbot이 이 경로를 사용하므로 HTTP 허용 필요
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # 나머지 모든 요청은 HTTPS로 리다이렉트
    # 예: http://wheelfinder.deving.xyz → https://wheelfinder.deving.xyz
    location / {
        return 301 https://$server_name$request_uri;
    }
  }

  # ============================================
  # HTTPS 서버 (포트 443)
  # 목적: 실제 서비스 제공
  # ============================================
  server {
    listen 443 ssl http2;               # IPv4의 443포트, SSL 활성화, HTTP/2 지원
    listen [::]:443 ssl http2;          # IPv6의 443포트
    server_name wheelfinder.deving.xyz; # 본인의 도메인

    # ------------------------------------------
    # SSL 인증서 파일 경로
    # ------------------------------------------
    ssl_certificate /etc/nginx/ssl/fullchain.pem;       # 공개 인증서 (체인 포함)
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;    # 개인 키

    # ------------------------------------------
    # SSL 프로토콜 및 암호화 설정
    # ------------------------------------------
    ssl_protocols TLSv1.2 TLSv1.3;                     # TLS 1.2와 1.3만 허용 (보안)
    ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384';
    ssl_prefer_server_ciphers off;                     # 클라이언트 암호화 우선순위 존중

    # ------------------------------------------
    # SSL 성능 최적화
    # ------------------------------------------
    ssl_session_cache shared:SSL:10m;   # SSL 세션 캐시 (10MB, 약 40,000 세션)
    ssl_session_timeout 10m;            # 세션 타임아웃 (10분)
    ssl_session_tickets off;            # 세션 티켓 비활성화 (보안)

    # ------------------------------------------
    # 보안 헤더 추가
    # ------------------------------------------
    # HSTS: 브라우저에게 "항상 HTTPS 사용" 지시
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # X-Frame-Options: 클릭재킹 방지
    add_header X-Frame-Options "SAMEORIGIN" always;

    # X-Content-Type-Options: MIME 타입 스니핑 방지
    add_header X-Content-Type-Options "nosniff" always;

    # X-XSS-Protection: XSS 공격 방지
    add_header X-XSS-Protection "1; mode=block" always;

    # ------------------------------------------
    # 로케이션 1: 프론트엔드 (/)
    # 모든 경로 (/, /about, /map 등)
    # ------------------------------------------
    # Frontend (Next.js)
    location / {
      proxy_pass http://frontend;  # 업스트림 frontend로 전달
      proxy_http_version 1.1;      # HTTP/1.1 사용 (Keep-Alive 지원)

      # WebSocket 지원
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      # 클라이언트 정보 전달 헤더
      proxy_set_header Host $host;                              # 원본 도메인
      proxy_set_header X-Real-IP $remote_addr;                  # 실제 클라이언트 IP
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;  # 프록시 체인의 모든 IP
      proxy_set_header X-Forwarded-Proto $scheme;               # https
      proxy_set_header X-Forwarded-Host $host;                  # wheelfinder.deving.xyz
      proxy_set_header X-Forwarded-Port $server_port;           # 443

      # 프록시 동작 설정
      proxy_cache_bypass $http_upgrade;  # WebSocket 요청은 캐시 우회
      proxy_redirect off;                # 자동 리다이렉트 비활성화

      # 타임아웃 설정
      proxy_connect_timeout 60s;         # 백엔드 연결 타임아웃
      proxy_send_timeout 60s;            # 요청 전송 타임아웃
      proxy_read_timeout 60s;            # 응답 읽기 타임아웃
    }

    # ------------------------------------------
    # 로케이션 2: 백엔드 API (/api/v1/)
    # Spring Boot REST API
    # ------------------------------------------
    location /api/v1/ {
      proxy_pass http://backend;   # 업스트림 backend로 전달
      proxy_http_version 1.1;      # HTTP/1.1 사용

      # WebSocket 지원 (API에서 WebSocket 사용 시 필요)
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection $connection_upgrade;

      # 클라이언트 정보 전달 헤더
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $scheme;               # https로 전달
      proxy_set_header X-Forwarded-Host $host;
      proxy_set_header X-Forwarded-Port $server_port;

      # 프록시 동작 설정
      proxy_cache_bypass $http_upgrade;

      # API 타임아웃 (일반적으로 더 길게 설정)
      proxy_connect_timeout 60s;
      proxy_send_timeout 120s;           # API 요청은 더 오래 걸릴 수 있음
      proxy_read_timeout 120s;

      # 버퍼 설정 (대용량 요청/응답 처리)
      proxy_buffering on;
      proxy_buffer_size 4k;
      proxy_buffers 8 4k;
      proxy_busy_buffers_size 8k;
    }

    # ------------------------------------------
    # 로케이션 3: 헬스체크 (/health)
    # 모니터링 도구용
    # ------------------------------------------
    location /health {
      access_log off;                    # 헬스체크 로그 기록 안 함 (로그 절약)
      return 200 "healthy\n";            # 단순히 200 OK 반환
      add_header Content-Type text/plain;
    }
  }
}