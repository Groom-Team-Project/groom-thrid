name: Deploy to EC2

# ====================================
# 트리거: prod 브랜치에 push 될 때
# ====================================
on:
  pull_request:
    types: [closed]
    branches:
      - prod
  push:
    branches:
      - prod
    
# ====================================
# 워크플로우 작업
# ==================================== 
jobs:
  deploy:
    name: Deploy to Production
    runs-on: ubuntu-latest

    steps:
      # ----------------------------------
      # Step 1: 코드 체크아웃
      # ----------------------------------
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: prod

      # ----------------------------------
      # Step 2: SSH 키 설정
      # ----------------------------------
      - name: Setup SSH key
        run: |
          set -x
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          
          touch ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts
          
          printf "%s" "${{ secrets.EC2_SSH_PRIVATE_KEY }}" > ~/.ssh/groom_backend_key.pem
          chmod 600 ~/.ssh/groom_backend_key.pem
          ssh-keyscan -p ${{ secrets.EC2_SSH_PORT }} -H ${{ secrets.EC2_HOST }} >> ~/.ssh/known_hosts

      # ----------------------------------
      # Step 3: EC2 접속 및 배포
      # ----------------------------------
      - name: Deploy to EC2
        run: |
          ssh -i ~/.ssh/groom_backend_key.pem \
            -o StrictHostKeyChecking=no \
            ${{ secrets.EC2_USER }}@${{ secrets.EC2_HOST }} << 'EOF'
          
            set -euo pipefail
            echo ">>> SSH: connected $(date)"     
          
            # 프로젝트 디렉토리로 이동
            cd ${{ secrets.EC2_PROJECT_PATH }}
            
            # Git에서 최신 코드 가져오기
            echo ">>> Pulling latest code from Git...$(date)"
            git fetch origin prod
            git reset --hard origin/prod
          
            # 배포 스크립트 실행
            echo ">>> Running deployment script...$(date)"
            chmod +x prod.sh
            ./prod.sh build
            
            # 결과 확인
            echo ">>> prod.sh finished with exit \$? $(date)"
            EOF
          rc=$?
          echo "ssh exit code: $rc"
          if [ $rc -ne 0 ]; then
            echo "Deployment failed (ssh rc=$rc)"
            exit $rc
          fi
          echo "Deployment step completed successfully"

      # ----------------------------------
      # Step 4: 배포 알림 (선택)
      # ----------------------------------
      - name: Deployment notification
        if: always()
        run: |
          if [ ${{ job.status }} == 'success' ]; then
            echo "✅ 배포 성공!"
          else
            echo "❌ 배포 실패!"
          fi